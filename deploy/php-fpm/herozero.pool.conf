; Hero Zero — pool PHP-FPM dedicado.
; Instale em /etc/php/8.3/fpm/pool.d/herozero.conf e reinicie o php8.3-fpm.
; Socket casado com o fastcgi_pass do deploy/nginx/herozero.conf.
[herozero]
user = herozero
group = herozero

listen = /run/php/php8.3-fpm-herozero.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; Dynamic: ajuste conforme RAM/CPU do host.
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 500

; Producao: sem exibir erros ao cliente; log em arquivo.
php_admin_value[display_errors] = Off
php_admin_flag[log_errors] = On
php_admin_value[error_log] = /var/log/herozero/php-fpm-error.log
php_admin_value[expose_php] = Off

; Variaveis de ambiente do app (o Laravel le via getenv()/.env).
; Prefira clear_env=no + EnvironmentFile no servico, ou defina aqui:
clear_env = no

; Endurecimento: so as funcoes necessarias.
php_admin_value[disable_functions] = exec,passthru,shell_exec,system,proc_open,popen
