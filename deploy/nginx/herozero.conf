# Hero Zero — Nginx (reverse proxy + TLS + rate limit + WebSocket).
#
# Coloque em /etc/nginx/sites-available/herozero.conf e crie o symlink em
# sites-enabled. Ajuste server_name, caminhos de cert e o root do Laravel.
# Requer os blocos `limit_req_zone`/`map` de deploy/nginx/rate-limit.conf incluidos
# no contexto http (ver deploy/README.md).

# --- HTTP: redireciona tudo p/ HTTPS + desafio ACME (certbot) ---------------
server {
    listen 80;
    listen [::]:80;
    server_name your-game-host.example;

    # Renovacao Let's Encrypt (webroot).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: aplicacao --------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name your-game-host.example;

    # Raiz publica do Laravel (server-laravel/public).
    root /var/www/herozero/server-laravel/public;
    index index.php index.html;

    # --- TLS ---------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/your-game-host.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-game-host.example/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # --- Headers de seguranca ---------------------------------------------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    server_tokens off;

    client_max_body_size 8m;
    charset utf-8;

    # --- Socket em tempo real (Engine.IO v2 / Socket.IO v2) ----------------
    # Proxy WebSocket + polling para o socket-server (Node, 127.0.0.1:8090).
    location /socket.io/ {
        limit_req zone=hz_socket burst=20 nodelay;
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 350s;   # > pingTimeout (60s) + folga
    }

    # NUNCA exponha o endpoint interno de push do socket.
    location = /push { return 404; }

    # --- API do jogo: rate limit por IP -----------------------------------
    location = /request.php {
        limit_req zone=hz_game burst=60 nodelay;
        try_files $uri /index.php?$query_string;
    }
    location = /beta-api {
        limit_req zone=hz_auth burst=5 nodelay;
        try_files $uri /index.php?$query_string;
    }

    # --- Assets estaticos do cliente --------------------------------------
    location /js/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # --- Laravel front controller -----------------------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_pass unix:/run/php/php8.3-fpm-herozero.sock;
        fastcgi_read_timeout 60s;
        fastcgi_hide_header X-Powered-By;
    }

    # Bloqueia dotfiles e fontes sensiveis.
    location ~ /\.(?!well-known).* { deny all; }
    location ~* \.(env|log|sqlite)$ { deny all; }
}
