# Hero Zero — zonas de rate limit do Nginx (contexto http).
# Inclua em /etc/nginx/conf.d/hz-rate-limit.conf (fora do bloco server), pois
# limit_req_zone e o map de Connection precisam viver no contexto http.

# Suporte a upgrade WebSocket: Connection = "upgrade" so quando Upgrade existe.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Zonas por IP (10m ~= 160k IPs). Ajuste as taxas conforme a carga:
#  - hz_game:   API do jogo (polling) — generoso.
#  - hz_auth:   registro/login — baixo, anti brute-force.
#  - hz_socket: handshake do socket — moderado.
limit_req_zone $binary_remote_addr zone=hz_game:10m   rate=180r/m;
limit_req_zone $binary_remote_addr zone=hz_auth:10m   rate=20r/m;
limit_req_zone $binary_remote_addr zone=hz_socket:10m rate=60r/m;

# Responde 429 (nao 503) quando estoura o limite.
limit_req_status 429;
