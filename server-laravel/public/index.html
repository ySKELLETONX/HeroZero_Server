<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
	<title>Hero Zero — Servidor Local</title>
	<style>
		:root { color-scheme: dark; --page:#111315; --surface:#1b1e21; --surface-2:#25292d; --line:#393f45; --text:#f2f4f5; --muted:#aeb6bd; --brand:#ffc400; --online:#43d17b; --tech:#63c7d4; }
		* { box-sizing: border-box; }
		html, body { margin:0; min-height:100%; background:var(--page); color:var(--text); }
		body { font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
		.topbar { height:58px; display:flex; align-items:center; justify-content:space-between; gap:18px; padding:0 22px; background:var(--surface); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:20; }
		.brand { display:flex; align-items:center; gap:11px; min-width:0; }
		.brand-mark { width:34px; height:34px; display:grid; place-items:center; background:var(--brand); color:#161616; font-weight:900; font-size:18px; border-radius:6px; box-shadow:inset 0 -3px 0 rgba(0,0,0,.18); }
		.brand-name { font-size:17px; font-weight:800; line-height:1; }
		.brand-env { color:var(--muted); font-size:12px; margin-top:4px; }
		.brand-env code { color:#d9e0e5; }
		.session { display:flex; align-items:center; gap:12px; min-width:0; }
		.online { display:flex; align-items:center; gap:7px; color:var(--muted); font-size:12px; }
		.online-dot { width:8px; height:8px; border-radius:50%; background:var(--online); box-shadow:0 0 0 3px rgba(67,209,123,.13); }
		.hero-name { font-size:14px; font-weight:700; max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
		.account-link { display:inline-flex; align-items:center; gap:7px; height:34px; padding:0 11px; border:1px solid var(--line); border-radius:6px; color:var(--text); text-decoration:none; font-size:13px; font-weight:700; background:var(--surface-2); }
		.account-link:hover { border-color:var(--brand); color:var(--brand); }
		.account-link svg { width:16px; height:16px; fill:currentColor; }
		.debug { background:#15181a; border-bottom:1px solid var(--line); }
		.debug summary { min-height:34px; display:flex; align-items:center; gap:10px; padding:6px 22px; cursor:pointer; list-style:none; color:var(--muted); font-size:12px; }
		.debug summary::-webkit-details-marker { display:none; }
		.debug summary::before { content:">_"; color:var(--tech); font:700 12px/1 ui-monospace,monospace; }
		.debug[open] summary { border-bottom:1px solid var(--line); }
		#diag { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
		#diag b { color:var(--text); font-weight:700; }
		#errbox { margin:0; padding:12px 22px; max-height:190px; overflow:auto; white-space:pre-wrap; background:#0c0e0f; color:#e7c96a; font:12px/1.55 ui-monospace,SFMono-Regular,Consolas,monospace; }
		.game-shell { padding:18px 16px 28px; }
		#appClient { width:min(1120px,100%) !important; height:auto !important; aspect-ratio:1120/755; margin:0 auto; display:block; background:#080909; border:1px solid #30353a; box-shadow:0 18px 42px rgba(0,0,0,.36); overflow:hidden; }
		#appClient canvas { display:block; width:100% !important; height:100% !important; }
		@media (max-width:680px) {
			.topbar { height:54px; padding:0 12px; }
			.brand-env,.online span,.account-link span { display:none; }
			.session { gap:9px; }
			.hero-name { max-width:120px; }
			.account-link { width:34px; padding:0; justify-content:center; }
			.debug summary,#errbox { padding-left:12px; padding-right:12px; }
			.game-shell { padding:10px 0 18px; }
			#appClient { border-left:0; border-right:0; }
		}
	</style>
</head>
<body>
	<header class="topbar" id="boot">
		<div class="brand">
			<div class="brand-mark" aria-hidden="true">HZ</div>
			<div><div class="brand-name">Hero Zero</div><div class="brand-env">Servidor local · <code id="apiurl"></code></div></div>
		</div>
		<div class="session">
			<div class="online"><i class="online-dot"></i><span>Online</span></div>
			<div class="hero-name" id="whoami">Carregando...</div>
			<a class="account-link" href="/beta.html" title="Trocar conta" aria-label="Trocar conta">
				<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10Zm0 2c-5 0-9 2.5-9 5.5V22h18v-2.5C21 16.5 17 14 12 14Zm8.5-7V4.5H18V3h2.5V.5H22V3h2.5v1.5H22V7h-1.5Z"/></svg>
				<span>Trocar conta</span>
			</a>
		</div>
	</header>
	<details class="debug">
		<summary><span id="diag">Iniciando diagnóstico...</span></summary>
		<pre id="errbox">Aguardando chamadas ao request.php...</pre>
	</details>

	<script type="text/javascript">
		// --- Logger do cliente: envia console/erros/chamadas request.php p/ server/logs/client.log ---
		(function(){
			var buffer = [], reqCount = 0, actions = [], frames = 0, lastFps = 0, t0 = Date.now();
			function ts(){ return new Date().toISOString().slice(11,23); }
			function push(kind, msg){ buffer.push('['+ts()+'] '+kind+' '+msg); }

			// flush periódico para o servidor
			function flush(useBeacon){
				if (!buffer.length) return;
				var payload = buffer.join('\n'); buffer = [];
				try {
					if (useBeacon && navigator.sendBeacon) navigator.sendBeacon('/clientlog', payload);
					else { var x=new XMLHttpRequest(); x.open('POST','/clientlog',true); x.send(payload); }
				} catch(e){}
			}
			setInterval(function(){ flush(false); }, 1000);
			window.addEventListener('beforeunload', function(){ flush(true); });

			// marca início de sessão
			push('SESSION', '===== nova sessão @ '+new Date().toString()+' | '+navigator.userAgent+' =====');

			// console.*
			['log','info','warn','error'].forEach(function(m){
				var orig = console[m] ? console[m].bind(console) : function(){};
				console[m] = function(){
					try { push('CONSOLE.'+m.toUpperCase(), Array.prototype.slice.call(arguments).map(String).join(' ').slice(0,2000)); } catch(e){}
					return orig.apply(null, arguments);
				};
			});
			// erros nativos
			window.addEventListener('error', function(e){ push('JS-ERROR', (e.message||'')+' @ '+((e.filename||'').split('/').pop())+':'+(e.lineno||'')); });
			window.addEventListener('unhandledrejection', function(e){ push('PROMISE-REJECT', String(e.reason && (e.reason.message||e.reason))); });

			// chamadas ao request.php (XHR / fetch / beacon), qualquer destino
			function capture(u, b){
				if((''+u).indexOf('request.php')===-1) return;
				reqCount++;
				var params = {};
				(''+b).split('&').forEach(function(kv){ var i=kv.indexOf('='); if(i>0) params[kv.slice(0,i)]=decodeURIComponent(kv.slice(i+1).replace(/\+/g,' ')); });
				if(params.action) actions.push(params.action);
				var host = (''+u).split('/')[2] || '?';
				push('REQUEST', 'host='+host+' action='+(params.action||'?'));
				// payload completo (útil p/ gameReportError e p/ inspecionar params)
				push('REQUEST-BODY', JSON.stringify(params).slice(0,4000));
				var box = document.getElementById('errbox');
				var visibleParams = Object.assign({}, params);
				if (visibleParams.user_session_id) visibleParams.user_session_id = '[protegido]';
				if (visibleParams.auth) visibleParams.auth = '[protegido]';
				if (box) box.textContent = 'ÚLTIMA chamada request.php\nhost: '+host+'\naction: '+(params.action||'?')+'\n\n'+JSON.stringify(visibleParams, null, 2);
			}
			// O servidor ROTACIONA a sessão a cada autoLoginUser; adota a nova no
			// hz_session salvo, senão o próximo F5 bootaria com sessão morta.
			function adoptSession(u, body, responseText){
				if((''+u).indexOf('request.php')===-1 || (''+body).indexOf('action=autoLoginUser')===-1) return;
				try {
					var r = JSON.parse(responseText);
					var user = r && r.data && r.data.user;
					if (!user || !user.session_id) return;
					var cur = JSON.parse(localStorage.getItem('hz_session') || 'null') || {};
					if (String(cur.user_id) === String(user.id)) {
						cur.session_id = user.session_id;
						localStorage.setItem('hz_session', JSON.stringify(cur));
					}
				} catch(e) {}
			}
			var O = XMLHttpRequest.prototype.open, S = XMLHttpRequest.prototype.send;
			XMLHttpRequest.prototype.open = function(m,u){ this.__u=u; return O.apply(this,arguments); };
			XMLHttpRequest.prototype.send = function(b){
				try{ capture(this.__u, b); }catch(e){}
				// So liga o listener p/ request.php: em requests de asset (binario,
				// responseType arraybuffer/blob) ler responseText lanca InvalidStateError
				// e quebrava o carregamento do jogo.
				if ((''+this.__u).indexOf('request.php')!==-1) {
					try{
						var xhr = this, body = b;
						xhr.addEventListener('load', function(){ try{ adoptSession(xhr.__u, body, xhr.responseText); }catch(e){} });
					}catch(e){}
				}
				return S.apply(this,arguments);
			};
			if (navigator.sendBeacon){ var B=navigator.sendBeacon.bind(navigator); navigator.sendBeacon=function(u,d){ try{ if((''+u).indexOf('/clientlog')===-1) capture(u, typeof d==='string'?d:''); }catch(e){} return B(u,d); }; }
			if (window.fetch){ var F=window.fetch.bind(window); window.fetch=function(u,o){
				try{capture((u&&u.url)||u, o&&o.body);}catch(e){}
				var p = F(u,o);
				var fu=(u&&u.url)||u, fb=o&&o.body;
				if ((''+fu).indexOf('request.php')!==-1) {
					try{
						p = p.then(function(resp){
							try{ resp.clone().text().then(function(t){ adoptSession(fu, fb, t); }).catch(function(){}); }catch(e){}
							return resp;
						});
					}catch(e){}
				}
				return p;
			}; }

			// HUD ao vivo
			(function loop(){ frames++; requestAnimationFrame(loop); })();
			setInterval(function(){ lastFps = frames; frames = 0; }, 1000);
			var el = document.getElementById('diag');
			setInterval(function(){
				var secs = ((Date.now()-t0)/1000).toFixed(0);
				el.innerHTML = 'rAF: <b>'+lastFps+' fps</b>  |  visível: '+document.visibilityState+
					'  |  request.php: <b>'+reqCount+'</b> '+(actions.length?'['+actions.slice(-8).join(', ')+']':'(nenhuma)')+
					'  |  logs → server/logs/client.log  |  '+secs+'s';
			}, 500);
		})();
	</script>

	<script type="text/javascript">
		// --- Identidade do jogador (multiplayer) ---------------------------------
		// Cada navegador entra na SUA conta. Prioridade:
		//   1) query string  ?uid=..&sid=..&name=..   (vindo do beta.html)
		//   2) localStorage  hz_session               (última conta logada aqui)
		//   3) fallback: convidado skelletonx (25328), p/ abrir o jogo sem login.
		var hzIdentity = (function () {
			function fromQuery() {
				var q = new URLSearchParams(location.search);
				if (!q.get('uid')) return null;
				return { user_id: q.get('uid'), session_id: q.get('sid') || '', name: q.get('name') || '' };
			}
			function fromStore() {
				try { return JSON.parse(localStorage.getItem('hz_session') || 'null'); } catch (e) { return null; }
			}
			var id = fromQuery() || fromStore() ||
				{ user_id: '25328', session_id: 'PrTvkhsQnOJamBJsB3IMMQnXI1JGkG', name: 'skelletonx (convidado)' };
			// persiste a identidade escolhida e limpa a query da barra de endereço.
			try { localStorage.setItem('hz_session', JSON.stringify(id)); } catch (e) {}
			if (location.search) history.replaceState(null, '', location.pathname);
			return id;
		})();

		// --- Config do ambiente (equivale às globais da página oficial) ---
		var appCDNUrl          = "https://hz-static-2.akamaized.net/";
		var appConfigPlatform  = "standalone";
		var appConfigLocale    = "pt_BR";
		var appConfigServerId  = "local";

		// --- clientVars: como na página oficial, mas apontando p/ o servidor local ---
		var clientVars = {
			applicationTitle:   "Hero Zero (local)",
			urlPublic:          location.origin + "/",
			urlRequestServer:   location.origin + "/request.php",
			urlSocketServer:    "",                 // socket ainda não emulado
			urlCDN:             appCDNUrl,
			userId:             String(hzIdentity.user_id),   // dispara autoLoginUser p/ ESTA conta
			userSessionId:      String(hzIdentity.session_id),
			testMode:           "false",
			debugRunTests:      "false",
			registrationSource: "ref=;subid=;lp=;",
			startupParams:      "",
			platform:           "standalone",
			ssoInfo:            "",
			uniqueId:           "local" + Math.floor(Date.now() / 1000),
			server_id:          "local",
			default_locale:     "pt_BR",
			blockRegistration:  "false",
			isFriendbarSupported: "false"
		};
		document.getElementById("apiurl").textContent = clientVars.urlRequestServer;
		document.getElementById("whoami").textContent = (hzIdentity.name || ('user ' + hzIdentity.user_id));
	</script>

	<!-- libs do cliente (mesmas versões da página oficial) -->
	<script src="/js/jquery-3.3.1.min.js"></script>
	<script src="/js/standalone.js?v=local-payment-2"></script>
	<script>
		// Pagamento local: o HTML oficial tem uma janela/iframe de billing.
		// No embarque local nao temos esse DOM, entao confirmamos a compra sem quebrar a UI.
		window.buyCurrency = function (url) {
			window.__localPaymentDone = false;
			var paymentWindow = document.getElementById("paymentWindow");
			var paymentFrame = document.getElementById("paymentFrame");
			var flashContainer = document.getElementById("flashContainer");
			if (paymentWindow && paymentFrame && flashContainer) {
				paymentWindow.style.display = "";
				paymentFrame.style.backgroundColor = "";
				paymentFrame.src = "about:blank";
				paymentFrame.src = url;
				flashContainer.style.left = "-2000px";
				return;
			}

			var iframe = document.getElementById("localPaymentFrame");
			if (!iframe) {
				iframe = document.createElement("iframe");
				iframe.id = "localPaymentFrame";
				iframe.style.width = "0";
				iframe.style.height = "0";
				iframe.style.border = "0";
				iframe.style.position = "absolute";
				iframe.style.left = "-9999px";
				document.body.appendChild(iframe);
			}
			iframe.src = url || "about:blank";

			setTimeout(function () {
				if (window.__localPaymentDone) return;
				window.__localPaymentDone = true;
				var appClient = document.getElementById("appClient");
				if (appClient && typeof appClient.callbackBuyCurrency === "function") {
					appClient.callbackBuyCurrency(true);
				}
			}, 250);
		};

		window.closePaymentWindow = function (success) {
			if (window.__localPaymentDone) return;
			window.__localPaymentDone = true;
			var paymentWindow = document.getElementById("paymentWindow");
			var paymentFrame = document.getElementById("paymentFrame");
			var flashContainer = document.getElementById("flashContainer");
			var paymentInfo = document.getElementById("paymentInfoText");
			if (paymentWindow) paymentWindow.style.display = "none";
			if (paymentFrame) paymentFrame.src = "about:blank";
			if (flashContainer) flashContainer.style.left = "0px";
			if (paymentInfo) paymentInfo.style.display = "";
			var appClient = document.getElementById("appClient");
			if (appClient && typeof appClient.callbackBuyCurrency === "function") {
				appClient.callbackBuyCurrency(success !== false);
			}
		};
	</script>
	<script src="/js/TweenLite.min.js"></script>
	<script src="/js/TweenMax.min.js"></script>
	<script src="/js/TimelineLite.min.js"></script>
	<script src="/js/TimelineMax.min.js"></script>

	<script type="text/javascript">
		var gameLoaded = false;
		function gameFileLoaded() {
			gameLoaded = true;
			if (typeof embedGame === "function") embedGame();
		}
	</script>

	<!-- o cliente (runtime lime/OpenFL vai embutido) -->
	<script async onload="gameFileLoaded();" src="/js/HeroZero.min.js"></script>

	<main class="game-shell">
		<div id="appClient" style="cursor: default;"></div>
	</main>

	<script type="text/javascript">
		var appWidth = 1120;
		var appHeight = 755;

		if (gameLoaded) embedGame();

		function embedGame() {
			lime.embed("HeroZero.min", "appClient", appWidth, appHeight, {
				height: appHeight,
				rootPath: appCDNUrl + "assets/html5",   // arte servida pelo CDN oficial
				parameters: clientVars
			});
		}
	</script>
</body>
</html>
